<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="tsBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="tsLock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="tsConcurrent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="tsSemaphore" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="tsAtomic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="tsThreadLocal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="tsResource" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="tsSh" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="660" rx="12" fill="url(#tsBg)"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Thread Safety Model</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Every shared resource is protected by an appropriate synchronization primitive - no nested locks</text>

  <!-- ==================== COLUMN HEADERS ==================== -->
  <text x="175" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Shared Resource</text>
  <text x="535" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Protection Mechanism</text>
  <text x="820" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Access Pattern</text>
  <line x1="40" y1="102" x2="920" y2="102" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ==================== ROW 1: Priority Queue ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="116" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="white">Priority Queue</text>
    <text x="175" y="156" text-anchor="middle" font-size="10" fill="#94a3b8">SortedDictionary&lt;int, Queue&lt;Job&gt;&gt;</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="116" width="310" height="52" rx="7" fill="url(#tsLock)"/>
    <text x="402" y="140" font-size="12" font-weight="600" fill="white">lock(_queueLock)</text>
    <text x="402" y="157" font-size="10" fill="#fecaca">Exclusive mutual exclusion</text>
  </g>
  <g>
    <rect x="720" y="116" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="140" text-anchor="middle" font-size="11" fill="#475569">Submit, Dequeue,</text>
    <text x="820" y="156" text-anchor="middle" font-size="11" fill="#475569">GetTopJobs</text>
  </g>

  <!-- ==================== ROW 2: Queue Size ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="180" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="white">Queue Size Counter</text>
    <text x="175" y="220" text-anchor="middle" font-size="10" fill="#94a3b8">_currentQueueSize (int)</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="180" width="310" height="52" rx="7" fill="url(#tsLock)"/>
    <text x="402" y="204" font-size="12" font-weight="600" fill="white">lock(_queueLock)</text>
    <text x="402" y="221" font-size="10" fill="#fecaca">Atomic with enqueue/dequeue</text>
  </g>
  <g>
    <rect x="720" y="180" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="203" text-anchor="middle" font-size="11" fill="#475569">Capacity check +</text>
    <text x="820" y="219" text-anchor="middle" font-size="11" fill="#475569">increment/decrement</text>
  </g>

  <!-- ==================== ROW 3: JobHandles / Registry / TCS ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="244" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="267" text-anchor="middle" font-size="12" font-weight="600" fill="white">Handles, Registry, TCS Maps</text>
    <text x="175" y="284" text-anchor="middle" font-size="10" fill="#94a3b8">ConcurrentDictionary&lt;Guid, ...&gt;</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="244" width="310" height="52" rx="7" fill="url(#tsConcurrent)"/>
    <text x="402" y="268" font-size="12" font-weight="600" fill="white">ConcurrentDictionary</text>
    <text x="402" y="285" font-size="10" fill="#bfdbfe">Lock-free concurrent reads/writes</text>
  </g>
  <g>
    <rect x="720" y="244" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="267" text-anchor="middle" font-size="11" fill="#475569">Submit, ProcessJob,</text>
    <text x="820" y="283" text-anchor="middle" font-size="11" fill="#475569">GetJob, Dispose</text>
  </g>

  <!-- ==================== ROW 4: Worker Signaling ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="308" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="331" text-anchor="middle" font-size="12" font-weight="600" fill="white">Worker Signaling</text>
    <text x="175" y="348" text-anchor="middle" font-size="10" fill="#94a3b8">_jobAvailable</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="308" width="310" height="52" rx="7" fill="url(#tsSemaphore)"/>
    <text x="402" y="332" font-size="12" font-weight="600" fill="white">SemaphoreSlim(0)</text>
    <text x="402" y="349" font-size="10" fill="#ddd6fe">Efficient blocking with cancellation</text>
  </g>
  <g>
    <rect x="720" y="308" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="331" text-anchor="middle" font-size="11" fill="#475569">Submit (Release),</text>
    <text x="820" y="347" text-anchor="middle" font-size="11" fill="#475569">WorkerLoop (Wait)</text>
  </g>

  <!-- ==================== ROW 5: Execution Log ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="372" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="395" text-anchor="middle" font-size="12" font-weight="600" fill="white">Execution Log</text>
    <text x="175" y="412" text-anchor="middle" font-size="10" fill="#94a3b8">List&lt;JobExecutionRecord&gt;</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="372" width="310" height="52" rx="7" fill="url(#tsLock)"/>
    <text x="402" y="396" font-size="12" font-weight="600" fill="white">lock(_logLock)</text>
    <text x="402" y="413" font-size="10" fill="#fecaca">Short critical section</text>
  </g>
  <g>
    <rect x="720" y="372" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="395" text-anchor="middle" font-size="11" fill="#475569">ProcessJobWithRetry,</text>
    <text x="820" y="411" text-anchor="middle" font-size="11" fill="#475569">GenerateReport</text>
  </g>

  <!-- ==================== ROW 6: File Logging ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="436" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="459" text-anchor="middle" font-size="12" font-weight="600" fill="white">File Logging (jobs.log)</text>
    <text x="175" y="476" text-anchor="middle" font-size="10" fill="#94a3b8">StreamWriter (async)</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="436" width="310" height="52" rx="7" fill="url(#tsSemaphore)"/>
    <text x="402" y="460" font-size="12" font-weight="600" fill="white">SemaphoreSlim(1, 1)</text>
    <text x="402" y="477" font-size="10" fill="#ddd6fe">Async-compatible mutex</text>
  </g>
  <g>
    <rect x="720" y="436" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="459" text-anchor="middle" font-size="11" fill="#475569">AppendLogAsync</text>
    <text x="820" y="475" text-anchor="middle" font-size="11" fill="#475569">(event handlers)</text>
  </g>

  <!-- ==================== ROW 7: Random ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="500" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="523" text-anchor="middle" font-size="12" font-weight="600" fill="white">Random Number Generation</text>
    <text x="175" y="540" text-anchor="middle" font-size="10" fill="#94a3b8">Random instances</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="500" width="310" height="52" rx="7" fill="url(#tsThreadLocal)"/>
    <text x="402" y="524" font-size="12" font-weight="600" fill="white">ThreadLocal&lt;Random&gt;</text>
    <text x="402" y="541" font-size="10" fill="#bbf7d0">Per-thread isolation, zero contention</text>
  </g>
  <g>
    <rect x="720" y="500" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="523" text-anchor="middle" font-size="11" fill="#475569">ExecuteIOJob,</text>
    <text x="820" y="539" text-anchor="middle" font-size="11" fill="#475569">GenerateRandomJob</text>
  </g>

  <!-- ==================== ROW 8: Report Index + Disposal ==================== -->
  <g filter="url(#tsSh)">
    <rect x="40" y="564" width="270" height="52" rx="7" fill="url(#tsResource)"/>
    <text x="175" y="587" text-anchor="middle" font-size="12" font-weight="600" fill="white">Report Index / Disposal Guard</text>
    <text x="175" y="604" text-anchor="middle" font-size="10" fill="#94a3b8">_reportIndex, _disposed (int)</text>
  </g>
  <g filter="url(#tsSh)">
    <rect x="380" y="564" width="310" height="52" rx="7" fill="url(#tsAtomic)"/>
    <text x="402" y="588" font-size="12" font-weight="600" fill="white">Interlocked Operations</text>
    <text x="402" y="605" font-size="10" fill="#fed7aa">Increment / CompareExchange</text>
  </g>
  <g>
    <rect x="720" y="564" width="200" height="52" rx="7" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="820" y="587" text-anchor="middle" font-size="11" fill="#475569">GenerateReport,</text>
    <text x="820" y="603" text-anchor="middle" font-size="11" fill="#475569">Dispose</text>
  </g>

  <!-- ==================== LEGEND ==================== -->
  <rect x="40" y="630" width="880" height="22" rx="4" fill="white" fill-opacity="0.5"/>
  <rect x="60" y="633" width="14" height="14" rx="3" fill="url(#tsLock)"/>
  <text x="80" y="645" font-size="10" fill="#475569">lock (monitor)</text>
  <rect x="195" y="633" width="14" height="14" rx="3" fill="url(#tsConcurrent)"/>
  <text x="215" y="645" font-size="10" fill="#475569">ConcurrentDictionary</text>
  <rect x="370" y="633" width="14" height="14" rx="3" fill="url(#tsSemaphore)"/>
  <text x="390" y="645" font-size="10" fill="#475569">SemaphoreSlim</text>
  <rect x="510" y="633" width="14" height="14" rx="3" fill="url(#tsAtomic)"/>
  <text x="530" y="645" font-size="10" fill="#475569">Interlocked (atomic)</text>
  <rect x="670" y="633" width="14" height="14" rx="3" fill="url(#tsThreadLocal)"/>
  <text x="690" y="645" font-size="10" fill="#475569">ThreadLocal (isolation)</text>
</svg>
